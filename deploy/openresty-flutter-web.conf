# OpenResty / Nginx config snippet for Flutter Web static hosting.
# Replace the root path and server_name before using it in production.

server {
  listen 80;
  server_name _;

  root /www/wwwroot/zhiyou-web;
  index index.html;

  include mime.types;
  types {
    application/wasm wasm;
    application/javascript js mjs;
    font/ttf ttf;
    font/otf otf;
    font/woff woff;
    font/woff2 woff2;
  }

  gzip on;
  gzip_static on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/wasm
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Enable these only if your OpenResty build includes the Brotli module.
  # brotli on;
  # brotli_static on;
  # brotli_comp_level 5;
  # brotli_types text/plain text/css application/javascript application/json application/wasm image/svg+xml font/ttf font/otf font/woff font/woff2;

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /flutter_bootstrap.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /main.dart.js {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri =404;
  }

  location ~* ^/(manifest\.json|version\.json|assets/(AssetManifest|FontManifest).*|flutter_service_worker\.js)$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location ^~ /canvaskit/ {
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location ^~ /flutter-font-fallback/ {
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|ttf|otf|woff|woff2)$ {
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
